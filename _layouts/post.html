---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %-d, %Y' }}</time>
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<nav class="post-nav">
  <div class="post-nav__prev">
    {%- if page.previous -%}
    <span class="post-nav__label">older</span>
    <a class="post-nav__link" href="{{ page.previous.url | relative_url }}">{{ page.previous.title }}</a>
    {%- endif -%}
  </div>
  <a class="post-nav__home" href="{{ '/' | relative_url }}">all posts</a>
  <div class="post-nav__next">
    {%- if page.next -%}
    <span class="post-nav__label">newer</span>
    <a class="post-nav__link" href="{{ page.next.url | relative_url }}">{{ page.next.title }}</a>
    {%- endif -%}
  </div>
</nav>
